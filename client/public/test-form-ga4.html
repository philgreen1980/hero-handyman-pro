<!DOCTYPE html>
<html>
<head>
  <title>Form Submission Test</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-left: 4px solid #333; }
    .success { border-color: green; background: #e8f5e9; }
    .error { border-color: red; background: #ffebee; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Form Submission & GA4 Tracking Test</h1>
  
  <div id="logs"></div>
  
  <button onclick="testFormSubmission()">Test Form Submission</button>
  
  <script>
    // Mock GA4 gtag function
    window.dataLayer = window.dataLayer || [];
    window.gtag = function() {
      dataLayer.push(arguments);
      log('📊 GA4 Event: ' + JSON.stringify(Array.from(arguments)), 'success');
    };
    
    function log(message, type = '') {
      const div = document.createElement('div');
      div.className = 'log ' + type;
      div.textContent = new Date().toLocaleTimeString() + ' - ' + message;
      document.getElementById('logs').appendChild(div);
      console.log(message);
    }
    
    // Import tracking functions (simulated)
    function trackEvent(eventName, eventParams) {
      log('🎯 trackEvent called: ' + eventName);
      if (typeof window.gtag !== 'undefined') {
        log('🎯 Calling window.gtag...');
        window.gtag('event', eventName, eventParams);
        log('🎯 gtag called successfully', 'success');
      } else {
        log('⚠️ window.gtag is undefined', 'error');
      }
    }
    
    function trackFormSubmission(formName) {
      log('📊 trackFormSubmission called: ' + formName);
      trackEvent('generate_lead', {
        event_category: 'Contact Form',
        event_label: formName,
        value: 1
      });
    }
    
    async function testFormSubmission() {
      log('=== Starting Form Submission Test ===');
      
      const data = {
        name: 'Test User',
        email: 'test@example.com',
        phone: '555-1234',
        city: 'St. Louis',
        service: 'Deck repair',
        message: 'Testing form submission and GA4 tracking'
      };
      
      log('📤 Submitting form data...');
      
      try {
        const response = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        
        const result = await response.json();
        log('📥 Response: ' + JSON.stringify(result));
        
        if (response.ok) {
          log('✅ Form submission successful!', 'success');
          log('✅ Calling trackFormSubmission...');
          trackFormSubmission('Test Form');
          log('✅ trackFormSubmission completed', 'success');
        } else {
          log('❌ Form submission failed', 'error');
        }
      } catch (error) {
        log('❌ Error: ' + error.message, 'error');
      }
    }
  </script>
</body>
</html>
