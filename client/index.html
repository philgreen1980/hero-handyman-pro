<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>Hero Handyman Pro | Handyman & Home Repair in St. Louis & Metro East</title>
    <meta name="description" content="Hero Handyman Pro — trusted St. Louis & Metro East handyman for 35+ years. Deck rot, drywall patches, sticking doors, and punch-list repairs. Small jobs welcome. Call 800-741-6056." />

    <!-- Open Graph / Social sharing fallbacks (overridden per-page by SEO component) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hero Handyman Pro" />
    <meta property="og:title" content="Hero Handyman Pro | Handyman & Home Repair in St. Louis & Metro East" />
    <meta property="og:description" content="Hero Handyman Pro — trusted St. Louis & Metro East handyman for 35+ years. Deck rot, drywall patches, sticking doors, and punch-list repairs. Small jobs welcome. Call 800-741-6056." />
    <meta property="og:image" content="https://www.herohandymanpro.com/og-image.jpg" />
    <meta property="og:url" content="https://www.herohandymanpro.com/" />

    <!-- Twitter Card fallbacks -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hero Handyman Pro | Handyman & Home Repair in St. Louis & Metro East" />
    <meta name="twitter:description" content="Hero Handyman Pro — trusted St. Louis & Metro East handyman for 35+ years. Deck rot, drywall patches, sticking doors, and punch-list repairs. Small jobs welcome. Call 800-741-6056." />
    <meta name="twitter:image" content="https://www.herohandymanpro.com/og-image.jpg" />

    <!-- Favicon assets (Hero Handyman Pro mascot icon) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Performance & mobile hints -->
    <meta name="theme-color" content="#E85818" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=yes" />

    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://elfsightcdn.com" />

    <!-- Preconnect for critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="/phil-green.webp" type="image/webp" />

    <!-- Google Fonts with font-display:swap for no render-blocking -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>

    <!-- Elfsight Google Reviews Widget -->
    <script src="https://elfsightcdn.com/platform.js" async></script>

    <!-- Google Analytics 4 (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA4_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA4_MEASUREMENT_ID%', {
        'send_page_view': true,
        'anonymize_ip': true
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Umami analytics removed: VITE_ANALYTICS_* env vars were never set, so
         this shipped as literal %VITE_ANALYTICS_ENDPOINT% and threw a 503 on
         every page load. GA4 above is the active analytics. To re-enable Umami,
         restore this tag AND set VITE_ANALYTICS_ENDPOINT + VITE_ANALYTICS_WEBSITE_ID
         in the build environment. -->
  </body>

</html>
